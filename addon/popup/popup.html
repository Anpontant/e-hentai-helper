<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-Hentai Helper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <section class="group">
        <div class="label" data-i18n="popupPreload"></div>
        <div class="segmented" data-setting="preloadAheadCount">
          <button type="button" data-value="0" data-i18n="popupOff"></button>
          <button type="button" data-value="1">+1</button>
          <button type="button" data-value="2">+2</button>
          <button type="button" data-value="3">+3</button>
        </div>
        <div class="group-checks">
          <label
            ><input type="checkbox" id="showStatus" /><span data-i18n="popupStatus"></span
          ></label>
          <label
            ><input type="checkbox" id="showPreloadThumbs" /><span
              data-i18n="popupPreloadThumbs"
            ></span
          ></label>
        </div>
      </section>

      <section class="group">
        <div class="label" data-i18n="popupFit"></div>
        <div class="segmented" data-setting="fitMode">
          <button type="button" data-value="height" data-i18n="popupHeight"></button>
          <button type="button" data-value="width" data-i18n="popupWidth"></button>
          <button type="button" data-value="original">1:1</button>
        </div>
        <label
          ><input type="checkbox" id="autoScroll" /><span data-i18n="popupAutoScroll"></span
        ></label>
      </section>

      <section class="group">
        <div class="label" data-i18n="popupViewMode"></div>
        <div class="segmented" data-setting="viewMode">
          <button type="button" data-value="off" data-i18n="popupOff"></button>
          <button type="button" data-value="single" data-i18n="popupViewSingle"></button>
          <button type="button" data-value="spread" data-i18n="popupViewSpread"></button>
        </div>
        <label id="coverAloneLabel"
          ><input type="checkbox" id="spreadCoverAlone" /><span
            data-i18n="popupSpreadCoverAlone"
          ></span
        ></label>
      </section>

      <section class="actions">
        <button type="button" id="btn-scroll" data-i18n="popupScroll"></button>
        <button type="button" id="btn-fullscreen" data-i18n="popupFullscreen"></button>
      </section>

      <div class="hint" id="hint"></div>
      <footer class="version">
        <span data-i18n="popupVersion"></span>
        <span id="version-number"></span>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
