name: Version Bump

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  patch-version:
    if: "!contains(github.event.head_commit.message, '[skip version]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Bump patch version
        id: bump
        run: |
          VERSION=$(node scripts/bump-version.mjs patch)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add addon/manifest.json package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip version]"
          git push
