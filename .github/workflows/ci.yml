name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
    paths:
      - addon/**
      - src/**
      - scripts/**
      - tools/**
      - package.json
      - package-lock.json
      - .eslintrc.cjs
      - .prettierrc.json
      - .prettierignore
      - .editorconfig
      - .github/workflows/ci.yml

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run checks
        run: npm run check
